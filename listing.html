<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HTTKR0F6YP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-HTTKR0F6YP');
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property — Rentleeys</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#f7f8fa;--border:#e5e7eb;--text:#111827;--text2:#6b7280;--text3:#9ca3af;--primary:#ff5a5f;--primary2:#e04e53;--primary-light:#fff1f1;--green:#00a651;--sans:'Plus Jakarta Sans',sans-serif;--body:'Inter',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--body);}
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:var(--sans);font-size:22px;font-weight:800;color:var(--text);text-decoration:none;}
.nav-logo span{color:var(--primary);}
.nav-back{font-size:14px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;}
.nav-back:hover{color:var(--primary);}

/* GALLERY */
.gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;height:480px;padding:24px;border-radius:24px;overflow:hidden;max-width:1100px;margin:0 auto;}
@media(max-width:768px){.gallery{grid-template-columns:1fr;grid-template-rows:280px;height:auto;} .gallery-img:not(:first-child){display:none;}}
.gallery-img{border-radius:12px;overflow:hidden;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:64px;cursor:pointer;}
.gallery-img:first-child{grid-row:1/3;}
.gallery-img img{width:100%;height:100%;object-fit:cover;}
.gallery-more{position:relative;}
.gallery-more::after{content:'View all photos';position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.7);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;}

/* MAIN LAYOUT */
.listing-main{max-width:1100px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:1fr 380px;gap:40px;align-items:start;}
@media(max-width:900px){.listing-main{grid-template-columns:1fr;}}

/* LEFT */
.listing-title{font-family:var(--sans);font-size:28px;font-weight:800;color:var(--text);margin-bottom:8px;letter-spacing:-0.5px;}
.listing-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.listing-meta-item{font-size:14px;color:var(--text2);display:flex;align-items:center;gap:4px;}
.listing-rating{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:700;color:var(--text);}
.divider{height:1px;background:var(--border);margin:24px 0;}
.host-row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.host-avatar{width:48px;height:48px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;font-family:var(--sans);}
.host-name{font-family:var(--sans);font-size:16px;font-weight:700;}
.host-joined{font-size:13px;color:var(--text2);}
.section-title{font-family:var(--sans);font-size:18px;font-weight:700;margin-bottom:14px;}
.description{font-size:15px;color:var(--text2);line-height:1.8;}
.amenities-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.amenity-item{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);padding:12px;border:1px solid var(--border);border-radius:10px;}
.reviews-list{display:flex;flex-direction:column;gap:20px;}
.review-item{padding:20px;background:var(--bg2);border-radius:12px;}
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.review-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.review-name{font-size:14px;font-weight:600;}
.review-date{font-size:12px;color:var(--text3);}
.review-stars{color:#f59e0b;font-size:12px;margin-bottom:4px;}
.review-text{font-size:14px;color:var(--text2);line-height:1.6;}

/* BOOKING CARD */
.booking-card{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:28px;position:sticky;top:84px;box-shadow:0 4px 24px rgba(0,0,0,0.1);}
.booking-price{font-family:var(--sans);font-size:26px;font-weight:800;color:var(--text);margin-bottom:20px;}
.booking-price span{font-size:15px;font-weight:400;color:var(--text2);}
.date-row{display:grid;grid-template-columns:1fr 1fr;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.date-field{padding:12px 14px;cursor:pointer;}
.date-field:first-child{border-right:1px solid var(--border);}
.date-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.date-input{width:100%;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--body);cursor:pointer;}
.guests-field{border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:16px;}
.guests-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.guests-input{width:100%;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--body);}
.book-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-bottom:12px;}
.book-btn:hover{background:var(--primary2);}
.price-breakdown{display:flex;flex-direction:column;gap:8px;padding-top:16px;border-top:1px solid var(--border);}
.price-row{display:flex;justify-content:space-between;font-size:14px;color:var(--text2);}
.price-row.total{font-weight:700;font-size:16px;color:var(--text);padding-top:8px;border-top:1px solid var(--border);}
.no-charge{text-align:center;font-size:12px;color:var(--text3);margin-top:8px;}

/* LOADING */
.loading{text-align:center;padding:80px 24px;color:var(--text2);}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">rent<span>leeys</span></a>
  <div class="nav-back" onclick="history.back()">← Back to search</div>
</nav>

<div id="listing-content">
  <div class="loading">Loading property...</div>
</div>

<!-- BOOKING MODAL -->
<div id="book-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:24px;">
  <div style="background:#fff;border-radius:20px;padding:36px;max-width:420px;width:100%;position:relative;">
    <button onclick="document.getElementById('book-modal').style.display='none'" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);">×</button>
    <div style="font-family:var(--sans);font-size:20px;font-weight:800;margin-bottom:6px;">Confirm booking request</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:20px;" id="book-summary"></div>
    <textarea id="book-message" placeholder="Message to host (optional) — introduce yourself and mention your trip purpose" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--body);resize:vertical;min-height:80px;outline:none;margin-bottom:16px;"></textarea>
    <div id="book-err" style="color:#ef4444;font-size:13px;margin-bottom:8px;min-height:18px;"></div>
    <button onclick="confirmBooking()" style="width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);">Send booking request 🏠</button>
    <div style="text-align:center;font-size:12px;color:var(--text3);margin-top:10px;">You won't be charged yet — host must confirm first</div>
  </div>
</div>

<script>
const SUPA_URL  = 'https://lvzwirglhdrutggaoyvm.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2endpcmdsaGRydXRnZ2FveXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Mjc0MzQsImV4cCI6MjA5NzQwMzQzNH0.55HME06oIExPfQ2KdgdBYbYQ4jGWzlfzDL_yXStc6zk';
const _db = window.supabase.createClient(SUPA_URL, SUPA_ANON);
var _user = null;
var _property = null;

_db.auth.onAuthStateChange(function(event, session) {
  _user = session ? session.user : null;
});

var AMENITY_ICONS = {'WiFi':'📶','Air Conditioning':'❄️','Kitchen':'🍳','Pool':'🏊','Parking':'🚗','Washing Machine':'🫧','TV':'📺','Gym':'💪','Pet Friendly':'🐾'};
var COLORS = ['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)'];

async function loadListing() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (!id) { document.getElementById('listing-content').innerHTML = '<div class="loading">Property not found.</div>'; return; }

  var { data, error } = await _db.from('rentleeys_properties').select('*').eq('id', id).single();
  if (error || !data) { document.getElementById('listing-content').innerHTML = '<div class="loading">Property not found.</div>'; return; }
  _property = data;

  var { data: host } = await _db.from('rentleeys_hosts').select('*').eq('user_id', data.host_id).single();
  var { data: reviews } = await _db.from('rentleeys_reviews').select('*').eq('property_id', id).order('created_at', {ascending:false}).limit(5);

  document.title = data.title + ' — Rentleeys';
  var sym = data.currency === 'PHP' ? '₱' : '$';
  var rating = (4.5 + Math.random()*0.4).toFixed(1);
  var hostName = (host && host.full_name) ? host.full_name : 'Host';
  var hostInitial = hostName.charAt(0).toUpperCase();
  var amenities = data.amenities || [];

  // Gallery HTML
  var imgs = data.images && data.images.length > 0 ? data.images : [];
  var galleryHTML = '<div class="gallery">';
  if (imgs.length === 0) {
    galleryHTML += '<div class="gallery-img" style="background:'+COLORS[0]+';"><span>🏠</span></div>';
    galleryHTML += '<div class="gallery-img" style="background:'+COLORS[1]+';"><span>🛏️</span></div>';
    galleryHTML += '<div class="gallery-img" style="background:'+COLORS[2]+';"><span>🚿</span></div>';
    galleryHTML += '<div class="gallery-img" style="background:'+COLORS[3]+';"><span>🌅</span></div>';
    galleryHTML += '<div class="gallery-img" style="background:'+COLORS[0]+';"><span>🍳</span></div>';
  } else {
    imgs.slice(0,5).forEach(function(src,i) {
      galleryHTML += '<div class="gallery-img'+(i===4?' gallery-more':'')+'"><img src="'+src+'" alt="Photo '+(i+1)+'"></div>';
    });
    while (imgs.length < 5) {
      galleryHTML += '<div class="gallery-img" style="background:'+COLORS[imgs.length%4]+';"></div>';
      imgs.push('');
    }
  }
  galleryHTML += '</div>';

  var reviewsHTML = reviews && reviews.length > 0
    ? reviews.map(function(r) {
        return '<div class="review-item"><div class="review-header"><div class="review-avatar">G</div><div><div class="review-name">Guest</div><div class="review-date">'+new Date(r.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</div></div></div><div class="review-stars">'+('★').repeat(r.rating)+('☆').repeat(5-r.rating)+'</div><div class="review-text">'+r.comment+'</div></div>';
      }).join('')
    : '<div style="text-align:center;padding:32px;color:var(--text2);background:var(--bg2);border-radius:12px;"><div style="font-size:32px;margin-bottom:8px;">💬</div><div>No reviews yet — be the first guest!</div></div>';

  // Set default dates
  var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  var nextWeek = new Date(); nextWeek.setDate(nextWeek.getDate()+7);
  var cin  = tomorrow.toISOString().split('T')[0];
  var cout = nextWeek.toISOString().split('T')[0];
  var nights = 6;
  var total  = data.price_per_night * nights;

  document.getElementById('listing-content').innerHTML = `
    ${galleryHTML}
    <div class="listing-main">
      <div>
        <div style="padding-top:8px;">
          <div class="listing-title">${data.title}</div>
          <div class="listing-meta">
            <div class="listing-rating">⭐ ${rating} · <span style="font-weight:400;color:var(--text2);">${(reviews||[]).length} reviews</span></div>
            <div class="listing-meta-item">📍 ${data.city}, ${data.country}</div>
            <div class="listing-meta-item">🏠 ${data.property_type}</div>
          </div>
          <div style="display:flex;gap:20px;flex-wrap:wrap;padding:20px;background:var(--bg2);border-radius:14px;margin-bottom:24px;">
            <div style="text-align:center;"><div style="font-family:var(--sans);font-size:22px;font-weight:800;">${data.max_guests}</div><div style="font-size:12px;color:var(--text2);">guests</div></div>
            <div style="text-align:center;"><div style="font-family:var(--sans);font-size:22px;font-weight:800;">${data.bedrooms}</div><div style="font-size:12px;color:var(--text2);">bedrooms</div></div>
            <div style="text-align:center;"><div style="font-family:var(--sans);font-size:22px;font-weight:800;">${data.bathrooms}</div><div style="font-size:12px;color:var(--text2);">bathrooms</div></div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="host-row">
          <div class="host-avatar">${hostInitial}</div>
          <div>
            <div class="host-name">Hosted by ${hostName}</div>
            <div class="host-joined">Member since ${host ? new Date(host.joined_at).getFullYear() : '2026'}</div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section-title">About this space</div>
        <div class="description">${data.description || 'A wonderful place to stay.'}</div>

        ${amenities.length > 0 ? `
        <div class="divider"></div>
        <div class="section-title">What this place offers</div>
        <div class="amenities-grid">
          ${amenities.map(function(a){return '<div class="amenity-item"><span>'+(AMENITY_ICONS[a]||'✓')+'</span><span>'+a+'</span></div>';}).join('')}
        </div>` : ''}

        <div class="divider"></div>
        <div class="section-title">Guest reviews</div>
        <div class="reviews-list">${reviewsHTML}</div>
      </div>

      <!-- BOOKING CARD -->
      <div class="booking-card">
        <div class="booking-price">${sym}${Number(data.price_per_night).toLocaleString()} <span>/ night</span></div>
        <div class="date-row">
          <div class="date-field">
            <div class="date-label">Check in</div>
            <input class="date-input" type="date" id="checkin" value="${cin}" onchange="updatePrice()" />
          </div>
          <div class="date-field">
            <div class="date-label">Check out</div>
            <input class="date-input" type="date" id="checkout" value="${cout}" onchange="updatePrice()" />
          </div>
        </div>
        <div class="guests-field">
          <div class="guests-label">Guests</div>
          <select class="guests-input" id="book-guests">
            ${Array.from({length:data.max_guests},function(_,i){return '<option value="'+(i+1)+'">'+(i+1)+' guest'+(i>0?'s':'')+'</option>';}).join('')}
          </select>
        </div>
        <button class="book-btn" onclick="openBooking()">Request to book</button>
        <div class="price-breakdown">
          <div class="price-row"><span id="price-label">${sym}${Number(data.price_per_night).toLocaleString()} × ${nights} nights</span><span id="price-subtotal">${sym}${Number(total).toLocaleString()}</span></div>
          <div class="price-row"><span>Rentleeys fee</span><span style="color:var(--green);">Free</span></div>
          <div class="price-row total"><span>Total</span><span id="price-total">${sym}${Number(total).toLocaleString()}</span></div>
        </div>
        <div class="no-charge">You won't be charged yet</div>
      </div>
    </div>`;
}

function updatePrice() {
  if (!_property) return;
  var cin  = document.getElementById('checkin').value;
  var cout = document.getElementById('checkout').value;
  if (!cin || !cout) return;
  var d1 = new Date(cin), d2 = new Date(cout);
  var nights = Math.max(1, Math.round((d2-d1)/(1000*60*60*24)));
  var sym = _property.currency === 'PHP' ? '₱' : '$';
  var subtotal = _property.price_per_night * nights;
  document.getElementById('price-label').textContent = sym+Number(_property.price_per_night).toLocaleString()+' × '+nights+' night'+(nights>1?'s':'');
  document.getElementById('price-subtotal').textContent = sym+Number(subtotal).toLocaleString();
  document.getElementById('price-total').textContent = sym+Number(subtotal).toLocaleString();
}

function openBooking() {
  if (!_user) { alert('Please sign in to book this property.'); window.location.href = '/?login=1'; return; }
  var cin  = document.getElementById('checkin').value;
  var cout = document.getElementById('checkout').value;
  var d1   = new Date(cin), d2 = new Date(cout);
  var nights = Math.max(1, Math.round((d2-d1)/(1000*60*60*24)));
  var sym  = _property.currency === 'PHP' ? '₱' : '$';
  var total = _property.price_per_night * nights;
  document.getElementById('book-summary').innerHTML = '<strong>'+_property.title+'</strong><br>'+cin+' → '+cout+' ('+nights+' nights)<br>Total: <strong>'+sym+Number(total).toLocaleString()+'</strong>';
  document.getElementById('book-modal').style.display = 'flex';
}

function trackEvent(name, params) {
  if(typeof gtag !== 'undefined') gtag('event', name, params || {});
}

async function confirmBooking() {
  trackEvent('begin_checkout', { currency: 'PHP' });
  var cin    = document.getElementById('checkin').value;
  var cout   = document.getElementById('checkout').value;
  var guests = parseInt(document.getElementById('book-guests').value);
  var msg    = document.getElementById('book-message').value.trim();
  var err    = document.getElementById('book-err');
  if (!cin || !cout) { err.textContent = 'Please select dates.'; return; }
  var d1 = new Date(cin), d2 = new Date(cout);
  var nights = Math.round((d2-d1)/(1000*60*60*24));
  if (nights < 1) { err.textContent = 'Check-out must be after check-in.'; return; }
  var total = _property.price_per_night * nights;

  try {
    var { error } = await _db.from('rentleeys_bookings').insert({
      property_id: _property.id,
      guest_id:    _user.id,
      host_id:     _property.host_id,
      check_in:    cin,
      check_out:   cout,
      guests:      guests,
      total_price: total,
      currency:    _property.currency,
      status:      'pending',
      message:     msg
    });
    if (error) throw error;
    document.getElementById('book-modal').style.display = 'none';
    alert('🎉 Booking request sent! The host will confirm within 24 hours.');
    window.location.href = 'dashboard.html';
  } catch(e) {
    err.textContent = 'Error: ' + e.message;
  }
}

window.addEventListener('DOMContentLoaded', loadListing);
</script>
</body>
</html>
